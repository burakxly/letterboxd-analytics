name: Sunday Night Shift

on:
  schedule:
    # Her Pazar gecesi saat 03:00'te çalışır (UTC saatiyle)
    - cron: '0 3 * * 0'
  workflow_dispatch: # İstediğin zaman manuel çalıştırmak için buton ekler

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4

      - name: Run Scraper and Builder
        run: |
          python web_scraper.py
          python database_builder.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add letterboxd_master.db
          git commit -m "Automated database update: $(date)" || echo "No changes to commit"
          git pull --rebase origin main
          git push