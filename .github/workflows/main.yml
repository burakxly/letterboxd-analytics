name: Daily Sync

on:
  schedule:
    # Her gece saat 03:00'te uyanır (UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: # Canın istediğinde manuel çalıştırmak için

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # lxml ve feedparser'ı eklemeyi unutma!
          pip install pandas requests beautifulsoup4 lxml feedparser

      - name: Run Web Scraper (RSS + Enrichment)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: |
          # DİKKAT: Burada database_builder çalıştırmıyoruz!
          # Builder sadece CSV yüklediğinde lokalde çalıştırılacak bir şey artık.
          python web_scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add letterboxd_master.db manual_watched.csv
          if git commit -m "Auto-sync from RSS: $(date)"; then
            git push
            echo "COMMITTED=true" >> $GITHUB_ENV
          else
            echo "No changes to commit"
            echo "COMMITTED=false" >> $GITHUB_ENV
          fi

      - name: Trigger Render Redeploy
        if: env.COMMITTED == 'true' && env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" --request POST "$RENDER_DEPLOY_HOOK"
          echo " → Render redeploy tetiklendi"